<script>
async function verify() {

  const response = await fetch("https://secure-auth-api.rahul-parvati.workers.dev/verify", {
    method: "GET",
    credentials: "include"
  });

  if (!response.ok) {
    window.location.href = "index.html";
  } else {
    const data = await response.json();
    document.body.innerHTML += "<h2>Role: " + data.role + "</h2>";
  }
}

verify();
</script>

<h1>Secure Dashboard</h1>
